apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-clone
  labels:
    app: netflix-clone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix-clone
  template:
    metadata:
      labels:
        app: netflix-clone
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: netflix-clone
          image: <ACR_NAME>.azurecr.io/netflix-clone-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: OTEL_SERVICE_NAME
              value: "netflix-clone-app"
            - name: OTEL_ENVIRONMENT
              value: "aks"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: otlp_traces_endpoint
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: otlp_headers
            - name: ELASTIC_NODE
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: elastic_node
            - name: ELASTIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: elastic_api_key