<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Number</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #101728;
        color: #f5f7ff;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      .card {
        width: min(520px, 90vw);
        background: #1b2440;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
      }

      .muted {
        opacity: 0.8;
      }

      input,
      button {
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
      }

      input {
        width: 160px;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        cursor: pointer;
        background: #2dd4bf;
        color: #062322;
        font-weight: 700;
      }

      .outline {
        background: transparent;
        color: #f5f7ff;
        border: 1px solid #66749f;
      }

      .history {
        margin-top: 12px;
      }

      .pill {
        display: inline-block;
        margin-right: 8px;
        margin-bottom: 8px;
        padding: 4px 10px;
        background: #29345b;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>🎯 Guess The Number</h1>
      <p class="muted">Guess a number between 1 and {{ max_number }}. You have {{ max_attempts }} attempts.</p>
      <p><strong>{{ message }}</strong></p>
      <p>Attempts used: {{ attempts_used }} / {{ max_attempts }}</p>

      <form method="post" class="row">
        <input type="number" name="guess" min="1" max="{{ max_number }}" required {{ 'disabled' if game_over else '' }} />
        <button type="submit" {{ 'disabled' if game_over else '' }}>Try</button>
      </form>

      <form method="post" action="/reset" class="row">
        <button class="outline" type="submit">New Game</button>
      </form>

      {% if history %}
      <section class="history">
        <h3>Previous guesses</h3>
        {% for n in history %}
        <span class="pill">{{ n }}</span>
        {% endfor %}
      </section>
      {% endif %}
    </main>
  </body>
</html>
