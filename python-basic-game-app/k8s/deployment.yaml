apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-game-app
  namespace: gameapp
  labels:
    app: python-game-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-game-app
  template:
    metadata:
      labels:
        app: python-game-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9464"
    spec:
      containers:
        - name: python-game-app
          image: sudipta244/pythonapp:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
            - name: otel-metrics
              containerPort: 9464
          env:
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: python-game-secret
                  key: flask-secret-key
            - name: MAX_NUMBER
              value: "20"
            - name: MAX_ATTEMPTS
              value: "6"
            - name: OTEL_EXPORTER_PROMETHEUS_HOST
              value: "0.0.0.0"
            - name: OTEL_EXPORTER_PROMETHEUS_PORT
              value: "9464"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
