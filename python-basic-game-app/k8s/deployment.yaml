apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-game-app
  labels:
    app: python-game-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-game-app
  template:
    metadata:
      labels:
        app: python-game-app
    spec:
      containers:
        - name: python-game-app
          image: your-registry/python-game-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: python-game-secret
                  key: flask-secret-key
            - name: MAX_NUMBER
              value: "20"
            - name: MAX_ATTEMPTS
              value: "6"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
